<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hero template — render to PNG at 1200×630</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===========================================
           HERO / OG CARD — 1200x630, Swiss Modern.
           Designed to be rendered to PNG by Chrome headless.
           Matches the deck's title slide aesthetic so the
           link preview is recognisably the same talk.
           =========================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            background: #fafafa;
            font-family: 'Nunito', sans-serif;
            color: #000;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            position: relative;
            width: 1200px;
            height: 630px;
            padding: 80px 96px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .top-rule {
            position: absolute;
            top: 0; left: 0;
            width: 140px;
            height: 6px;
            background: #000;
        }
        .eyebrow {
            font-family: 'Nunito', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 4.2px;
            text-transform: uppercase;
            color: #ff3300;
        }
        h1 {
            font-family: 'Archivo', sans-serif;
            font-weight: 900;
            font-size: 132px;
            line-height: 0.96;
            letter-spacing: -3.5px;
            color: #000;
            margin-top: 36px;
        }
        h1 .accent { color: #ff3300; }
        .subtitle {
            font-family: 'Nunito', sans-serif;
            font-size: 30px;
            font-weight: 400;
            line-height: 1.3;
            color: #2a2a2a;
            margin-top: 28px;
            max-width: 820px;
        }
        .byline {
            font-family: 'Nunito', sans-serif;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 2.4px;
            text-transform: uppercase;
            color: #000;
        }
        .byline .accent { color: #ff3300; font-weight: 900; }
        .corner-block {
            position: absolute;
            bottom: 80px;
            right: 96px;
            width: 120px;
            height: 120px;
            background: #ff3300;
        }
        /* Small badge above the corner block, optional flourish */
        .meta {
            position: absolute;
            bottom: 215px;
            right: 96px;
            width: 120px;
            text-align: right;
            font-family: 'Nunito', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="top-rule"></div>

        <div>
            <div class="eyebrow">A talk on computer-assisted fieldwork</div>
            <h1>AI as a <span class="accent">scout</span>,<br>not a judge.</h1>
            <p class="subtitle">Building a Southern Kurdish dialect tree with PARSE.</p>
        </div>

        <div class="byline">
            <span class="accent">Lucas Ardelean</span> &middot; Bamberg &middot; Zurich &middot; 2026
        </div>

        <div class="meta">15 min talk · 16 slides</div>
        <div class="corner-block"></div>
    </div>
</body>
</html>
